<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Meu Primeiro Currículo</title>
    <link rel="stylesheet" href="formulario.css">
</head>
<body>

    <header>
        <h1>Entre em Contato</h1>
    </header>

    <hr>

    <main>
        <form action="../agradecimento/agradecimento.html" method="GET">

            <div>
                <label>Nome Completo:</label><br>
                <input type="text" name="nome" class="campo-texto" required placeholder="Escreva seu nome">
            </div>

            <br>

            <div>
                <label>E-mail de Contato:</label><br>
                <input type="email" name="email" class="campo-texto" required placeholder="Escreva seu email aqui.">
            </div>

            <br>

            <div>
                <label>Mensagem:</label><br>
                <textarea name="mensagem" class="campo-texto" required placeholder="Escreva sua mensagem aqui..."></textarea>
            </div>

            <br>

            <div>
                <button type="submit">Enviar Mensagem</button>
            </div>

        </form>
    </main>

    <hr>

    <footer>
        <p><a href="../../index.html">Voltar para a Página Principal</a></p>
    </footer>

</body>
</html>
